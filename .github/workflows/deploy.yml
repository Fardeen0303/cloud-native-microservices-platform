name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: fardeen0303/user-service:latest

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: fardeen0303/product-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: fardeen0303/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy notification
        run: |
          echo "✅ Images built and pushed to Docker Hub"
          echo "✅ user-service:latest"
          echo "✅ product-service:latest"
          echo "✅ frontend:latest"
          echo "🚀 To deploy on K8s run:"
          echo "kubectl set image deployment/user-service user-service=fardeen0303/user-service:latest"
          echo "kubectl set image deployment/product-service product-service=fardeen0303/product-service:latest"
          echo "kubectl set image deployment/frontend frontend=fardeen0303/frontend:latest"
